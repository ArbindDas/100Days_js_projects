<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        display: flex;
        height: 100vh;
        width: 100vw;
        justify-content: center;
        align-items: center;
        background: rgb(131, 58, 180);
        background: linear-gradient(
          90deg,
          rgba(131, 58, 180, 1) 0%,
          rgba(200, 157, 157, 1) 50%,
          rgba(6, 27, 31, 1) 92%,
          rgba(252, 176, 69, 1) 100%
        );
      }

      .container {
        overflow: auto;
        height: 50%;
        width: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-wrap: wrap;
        flex-direction: column;
        gap: 20px;
        background: rgb(238, 174, 202);
        background: radial-gradient(
          circle,
          rgba(238, 174, 202, 1) 0%,
          rgba(148, 187, 233, 1) 100%
          
        );
      }

      .inputfield {
           padding: 10px;
           text-align: center;
      }

      .btnBox {
        text-align: center;
      }

      .submit {
        background-color: #4caf50;
        color: white;
        padding: 12px 20px;
        font-size: 16px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        transition: background-color 0.3s ease;
      }

      .submit:hover {
        background-color: #45a049;
      }

      .submit:focus {
        outline: none;
        box-shadow: 0 0 5px rgba(72, 239, 125, 0.8);
      }

      .inputForm {
        display: flex;
        flex-direction: column;

        gap: 10px;
        flex-wrap: wrap;
      }

      .answer {
        margin-top: 10px;
        font-size: 15px;
        text-align: center;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="heading">
        <h2>Write a Message</h2>
      </div>

      <form action="" class="inputForm">
        <div class="inputBox">
          <input
            class="inputfield"
            type="text"
            placeholder="enter some text here"
          />
        </div>

        <span class="answer"> </span>

        <br />
        <br />

        <div class="btnBox">
          <input class="submit" type="submit" />
        </div>

        <br />
        <br />
      </form>
    </div>

    <script>
      const inputField = document.querySelector(".inputfield");
      const submitBtn = document.querySelector(".submit");
      const answer = document.querySelector(".answer");
      const inputForm = document.querySelector(".inputForm");

      inputForm.addEventListener("submit", function (e) {
        e.preventDefault();

        const totalValue = inputField.value.trim();

        if (totalValue) {
          answer.innerText = `${totalValue} message delivered successfully`;
        } else {
            alert `enter some message first `
          answer.innerText = "";
        }

        inputField.value = "";
      });
    </script>
  </body>
</html>
