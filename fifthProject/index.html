<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="container">
        <form action="" class="formContainer">
            <div class="heading">
                <h1>
                Number Checker 

                </h1>
            </div>

            <div class="inputContainer">
                <label for="text" class="label">Enter the number </label>
                <br>
                <br>
                <input type="text" placeholder="enter the number" class="inputBox" >
                <br>
                <br>
                <span class="result"></span>
                <br>
                <span class="error"></span>
            </div>

            <div class="btnContainer">
                <button type="button" class="btn" onclick="printResult()">submit</button>
                <br>
                <br>
                <br>
                <button type="button" class="reset-btn" onclick="reset()">reset</button>

            </div>

          
        </form>
    </div>
</body>
</html>
