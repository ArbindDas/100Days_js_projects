<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        width: 100vw;
        background: rgb(0, 0, 0);
        background: linear-gradient(
          90deg,
          rgba(0, 0, 0, 1) 0%,
          rgba(6, 255, 131, 0.7707457983193278) 1%,
          rgba(22, 30, 238, 1) 78%,
          rgba(16, 80, 243, 1) 84%,
          rgba(0, 212, 255, 1) 100%
        );
      }

      .container {
        display: flex;
        justify-content: space-around;
        flex-direction: column;
        align-items: center;
        height: 50%;
        width: 50%;
        background: rgb(0,0,0);
        background: linear-gradient(90deg, rgba(0,0,0,1) 0%, rgba(255,169,6,0.7707457983193278) 1%, rgba(22,30,238,1) 78%, rgba(16,80,243,1) 84%, rgba(0,212,255,1) 100%);
        
      }
      .heading {
        font-size: 20px;
        color: #fff;
      }

      textarea{
        text-align: start;
      }
      p{
        color: #fff;
        text-align: center;
        font-weight: 600;

      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="heading">
        <h2>character counter live</h2>
      </div>

      <div class="value">
        <textarea name="textarea" id="textarea" cols="30" rows="10" placeholder="Character counting is a simple yet useful feature in many applications. It helps users stay within limits for social media posts, text messages, or form inputs."

        Sample Text 4:" onkeyup="count();"></textarea>
        <p>total character is : <span class="counter"> 0 </span></p>
      </div>
    </div>


    <script>

        const textarea = document.querySelector('#textarea')
        const counter = document.querySelector('.counter');
        const count = ()=>{



            const text = textarea.value;
            const  length = textarea.value.length;

            counter.textContent = `${length}`

        }
    </script>
  </body>
</html>
