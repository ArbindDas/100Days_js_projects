<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        display: flex;
        height: 100vh;
        width: 100vw;
        justify-content: center;
        align-items: center;
        background: rgb(131, 58, 180);
        background: linear-gradient(
          90deg,
          rgba(131, 58, 180, 1) 0%,
          rgba(200, 157, 157, 1) 50%,
          rgba(6, 27, 31, 1) 92%,
          rgba(252, 176, 69, 1) 100%
        );
      }

      .container {
        overflow: auto;
        height: 50%;
        width: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-wrap: wrap;
        flex-direction: column;
        gap: 20px;
        background: rgb(0, 0, 0);
        background: linear-gradient(
          90deg,
          rgba(0, 0, 0, 1) 0%,
          rgba(158, 102, 96, 1) 0%,
          rgba(6, 255, 143, 0.7707457983193278) 23%,
          rgba(16, 80, 243, 1) 58%,
          rgba(22, 30, 238, 1) 100%
        );
        border-radius: 100px;
      }

      .currentTimeBox {
        height: 60%;
        width: 50%;
        background-color: #2dfd79;
        border-radius: 20px;
        display: flex;
        justify-content: space-evenly;
        align-items: center;
        flex-direction: column;
      }

      h2 {
        text-align: center;
        margin-top: 5px;
      }

      .clock {
        width: 200px;
        height: 200px;
        border: 5px solid #4caf50;
        border-radius: 50%;
        background: linear-gradient(145deg, #e0e0e0, #ffffff);
        box-shadow: 5px 5px 15px rgba(0, 0, 0, 0.2),
          -5px -5px 15px rgba(255, 255, 255, 0.7);
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: "Roboto", sans-serif;
        font-size: 24px;
        font-weight: bold;
        color: #333;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="currentTimeBox">
        <div>
          <h2>current Time</h2>
        </div>

        <div class="clock" id="clock"></div>
      </div>
    </div>
  </body>
  <script>
    let clock = document.querySelector(".clock");

    setInterval(() => {
      let date = new Date();
      clock.innerHTML = date.toLocaleTimeString();
    }, 1000);
  </script>
</html>
