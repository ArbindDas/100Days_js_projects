<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        height: 100vh;
        width: 100vw;
        display: flex;
        justify-content: center;
        align-items: center;
        background: rgb(34, 193, 195);
        background: linear-gradient(
          0deg,
          rgba(34, 193, 195, 1) 0%,
          rgba(45, 253, 55, 1) 100%
        );

        .container {
          display: flex;
          justify-content: center;
          align-items: center;
          flex-direction: column;
          background: rgb(34, 193, 195);
          background: linear-gradient(
            0deg,
            rgba(34, 193, 195, 1) 0%,
            rgba(45, 136, 253, 1) 100%
          );
          height: 70%;
          width: 50%;
          flex-wrap: wrap;
          gap: 10px;
          padding: 10px;
          border-radius: 50px;
        }

        .heading {
          margin-bottom: 20px;
        }

        .counter {
          background-color: antiquewhite;
          padding: 10px;
          text-align: center;
          width: 100px;
          font-weight: 700;
          font-size: 20px;
        }

        .btn {
          outline: none;
          width: 100px;
          padding: 10px;
          outline: none;
          cursor: pointer;
          background: rgb(34, 193, 195);
          margin: 50px;
          background: linear-gradient(
            0deg,
            rgba(34, 193, 195, 1) 0%,
            rgba(45, 253, 55, 1) 100%
          );

          cursor: pointer;
          transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .btn:hover {
          transform: scale(1.5);
          cursor: pointer;
          box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .decrement {
          color: red;
          font-weight: bold;
          background: #000;
        }
        .increment {
          color: #fff;
          font-weight: bold;
        }
      }
    </style>
  </head>
  <body id="body">
    <div class="container">
      <div class="heading">
        <h2>counter Project</h2>
      </div>

      <div class="counter">0</div>

      <div class="buttons">
        <button class="increment btn">Increment</button>
        <button class="decrement btn">Decrement</button>
      </div>
    </div>

    <script>
      (function () {
        const btns = document.querySelectorAll(".btn");

        let counter = 0;

        btns.forEach((btn) => {
          btn.addEventListener("click", function () {
            if (btn.classList.contains("increment")) {
              if (counter >= 0 && counter < 10) {
                counter++;
              } else {
                alert`you cant not add more then :  ${counter}`;
              }
            }
            if (btn.classList.contains("decrement")) {
              if (counter === 0) {
                alert`you cant not decrease lesss then : 0 `;
              } else {
                counter--;
              }
            }

            const value = document.querySelector(".counter");

            value.textContent = counter;
          });
        });
      })();
    </script>
  </body>
</html>
