<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        height: 100vh;
        width: 100vw;
        display: flex;
        justify-content: center;
        align-items: center;
        /* background: rgb(34, 193, 195);
        background: linear-gradient(
          0deg,
          rgba(34, 193, 195, 1) 0%,
          rgba(45, 253, 55, 1) 100%
        ); */
      }

      .container {
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        background-color: rebeccapurple;
        height: 70%;
        width: 50%;
        flex-wrap: wrap;
        gap: 10px;
        padding: 10px;
        border-radius: 50px;
      }

      .heading {
        margin-bottom: 20px;
      }

      .boxes {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        /* Nested styles for specific IDs */
        #red {
          background-color: red;
        }

        #black {
          background-color: black;
          color: #fff;
        }

        #blue {
          background-color: blue;
        }

        #green {
          background-color: green;
        }

        #orange {
          background-color: orange;
        }
      }

      .box {
        height: 100px;
        width: 100px;
        background-color: beige;
        text-align: center;
        line-height: 100px;
        margin: 5px;
        border: 1px solid black;
        color: #fff;
        cursor: pointer;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
      }

      .box:hover {
        cursor: pointer;
        transform: scale(1.1);
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
      }

      /* Media Query for tablets */
      @media (max-width: 768px) {
        .container {
          height: 80%;
          width: 70%;
          gap: 8px;
          padding: 15px;
        }

        .box {
          height: 80px;
          width: 80px;
          line-height: 80px;
        }
      }

      #red {
        background-color: red;
      }

      #black {
        background-color: #000;
        color: #fff;
      }

      /* Media Query for mobile devices */
      @media (max-width: 480px) {
        .container {
          height: 90%;
          width: 90%;
          gap: 5px;
          padding: 10px;
        }

        .boxes {
          flex-direction: column;
          align-items: center;
        }

        .box {
          height: 60px;
          width: 60px;
          line-height: 60px;
          margin: 3px;
        }

        .heading h1 {
          font-size: 1.5rem;
        }
      }
    </style>
  </head>
  <body id="body">
    <div class="container">
      <div class="heading">
        <h1>Background Chnager</h1>
      </div>

      <div class="boxes">
        <div class="box" id="red">red</div>
        <div class="box" id="black">black</div>
        <div class="box" id="blue">blue</div>
        <div class="box" id="green">green</div>
        <div class="box" id="orange">orange</div>
      </div>
    </div>

    <script>
      const body = document.getElementById("body");
      const boxes = document.querySelectorAll(".boxes");

      boxes.forEach((box) => {
        box.addEventListener("click", function (e) {
          if (e.target.id === "red") {
            body.style.backgroundColor = "red";
          }
          if (e.target.id === "black") {
            body.style.backgroundColor = "black";
          }
          if (e.target.id === "blue") {
            body.style.backgroundColor = "blue";
          }
          if (e.target.id === "green") {
            body.style.backgroundColor = "green";
          }
          if (e.target.id === "orange") {
            body.style.backgroundColor = "orange";
          }
        });
      });
    </script>
  </body>
</html>
